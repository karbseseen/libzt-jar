name: Build windows

on:
  push:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Patch
      shell: pwsh
      run: |
        $prometheusFile = "libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/core/include/prometheus/family.h"
        $prometheusContent = Get-Content -Path $prometheusFile
        if ($prometheusContent -notcontains "#include <stdexcept>") {
          $patched = @($prometheusContent[0], "#include <stdexcept>") + $prometheusContent[1..($prometheusContent.Length - 1)]
          Set-Content -Path $prometheusFile -Value $patched
        }

        $javaBindingFile = "libzt/src/bindings/java/JavaSockets.cxx"
        $javaBindingContent = Get-Content -Path $javaBindingFile -Raw
        $javaBindingPatched = $javaBindingContent.Replace("sin_addr.s_addr", "sin_addr")
        if ($javaBindingPatched -ne $javaBindingContent) {
          Set-Content -Path $javaBindingFile -Value $javaBindingPatched
        }

        $buildScriptFile = "libzt/build.ps1"
        $buildScriptContent = Get-Content -Path $buildScriptFile -Raw
        $buildScriptPatched = $buildScriptContent.Replace("Visual Studio 16 2019", "Visual Studio 17 2022")
        if ($buildScriptPatched -ne $buildScriptContent) {
          Set-Content -Path $buildScriptFile -Value $buildScriptPatched
        }

    - name: Build
      shell: pwsh
      working-directory: libzt
      run: |
        $env:CXXFLAGS = "/I../../ext/ZeroTierOne/ext"
        . .\build.ps1
        Build-Library -BuildType "Release" -Arch "x64" -LangBinding "java"

    - name: Save
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: libzt/dist/win-x64-jni-release/*.jar
