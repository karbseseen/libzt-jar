name: Build macOS

on:
  push:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Checkout submodules
      run: git submodule update --init --recursive

    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Patch
      run: |
        sed -i '1a\#include <stdexcept>' libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/core/include/prometheus/family.h

    - name: Build
      working-directory: libzt
      run: ./build.sh host-jar "release"

    - name: Save
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: libzt/dist/macos-*-jar-release/pkg/*.jar
